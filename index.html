<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>새말연립 수도료 계산기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f4f8;color:#1e293b;}
.hdr{background:linear-gradient(135deg,#1e3a5f,#2563eb);color:white;padding:10px 14px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
.hdr-left{display:flex;align-items:center;gap:8px;}
.hdr-title{font-size:16px;font-weight:900;}
.hdr-sub{font-size:10px;opacity:.8;}
.hbtn{background:rgba(255,255,255,.2);border:none;color:white;border-radius:8px;
  padding:7px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;}
.pbar{background:white;border-bottom:2px solid #e5e7eb;padding:8px 14px;
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
select{border:1.5px solid #d1d5db;border-radius:8px;padding:6px 10px;
  font-size:13px;font-weight:700;font-family:inherit;background:white;color:#1e3a5f;}
.stat{font-size:10px;padding:4px 10px;border-radius:20px;font-weight:700;margin-left:auto;}
.st-ok{background:#dcfce7;color:#15803d;}
.st-auto{background:#fef3c7;color:#92400e;}
.st-new{background:#eff6ff;color:#2563eb;}
.nbtn{background:#2563eb;color:white;border:none;border-radius:8px;
  padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.tabs{display:flex;background:white;border-bottom:2px solid #e5e7eb;}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:11px;font-weight:600;
  color:#9ca3af;border-bottom:3px solid transparent;cursor:pointer;}
.tab.on{color:#2563eb;border-color:#2563eb;font-weight:700;}
.content{display:none;padding:14px;max-width:640px;margin:0 auto;padding-bottom:60px;}
.content.on{display:block;}
.card{background:white;border-radius:14px;padding:16px;margin-bottom:12px;
  box-shadow:0 2px 10px rgba(0,0,0,.07);}
.ctitle{font-size:14px;font-weight:700;color:#1e3a5f;margin-bottom:12px;}
.total-inp{width:100%;padding:14px;border:2px solid #2563eb;border-radius:10px;
  font-size:22px;font-weight:700;font-family:inherit;outline:none;color:#1e3a5f;text-align:center;}
.ucard{border:1.5px solid #e5e7eb;border-radius:12px;padding:12px;margin-bottom:10px;}
.ucard.locked{border-color:#86efac;background:#f0fdf4;}
.uhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.uname{font-size:13px;font-weight:700;color:#1e3a5f;}
.ugrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.ulabel{font-size:10px;color:#9ca3af;margin-bottom:3px;}
.uinp{width:100%;border:1px solid #e5e7eb;border-radius:7px;padding:8px 6px;
  font-size:13px;font-weight:700;font-family:inherit;outline:none;text-align:center;}
.uinp:focus{border-color:#2563eb;}
.uinp.dis{background:#f3f4f6;color:#9ca3af;}
.ubar{margin-top:8px;padding:6px 10px;border-radius:7px;
  display:flex;justify-content:space-between;font-size:11px;background:#f8fafc;color:#9ca3af;}
.ubar.ok{background:#f0fdf4;border:1px solid #86efac;color:#15803d;}
.ubar.err{background:#fef2f2;border:1px solid #fca5a5;color:#dc2626;}
.ubar.fix{background:#fffbeb;border:1px solid #fde68a;color:#d97706;}
.unote input{width:100%;border:1px solid #e5e7eb;border-radius:7px;padding:7px 8px;
  font-size:12px;font-family:inherit;outline:none;margin-top:6px;}
.lockbar{display:flex;align-items:center;justify-content:space-between;margin-top:8px;
  padding:7px 10px;border-radius:8px;background:#dcfce7;border:1px solid #86efac;}
.lockbar span{font-size:11px;color:#15803d;font-weight:600;}
.unlkbtn{background:#059669;color:white;border:none;border-radius:6px;
  padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;}
.sboard{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px;}
.si{border-radius:8px;padding:7px 10px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:4px;}
.si-done{background:#dcfce7;color:#15803d;border:1px solid #86efac;}
.si-wait{background:#fef3c7;color:#92400e;border:1px solid #fde68a;}
.si-fix{background:#fffbeb;color:#d97706;border:1px solid #fde68a;}
.si-note{background:#eff6ff;color:#1d4ed8;border:1px solid #93c5fd;}
.ssummary{padding:8px 12px;border-radius:8px;font-size:12px;text-align:center;
  background:#f8fafc;border:1px solid #e5e7eb;color:#6b7280;}
.ssummary.done{background:#dcfce7;border-color:#86efac;color:#15803d;font-weight:700;}
.calc-btn{width:100%;padding:16px;background:linear-gradient(135deg,#1e3a5f,#2563eb);
  color:white;border:none;border-radius:12px;font-size:16px;font-weight:700;
  cursor:pointer;font-family:inherit;margin-bottom:10px;}
.undo-btn{width:100%;padding:12px;background:#6366f1;color:white;border:none;
  border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.res-head{background:linear-gradient(135deg,#1e3a5f,#2563eb);border-radius:14px;
  padding:16px;color:white;margin-bottom:12px;}
.res-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px;}
.res-stat{background:rgba(255,255,255,.15);border-radius:8px;padding:8px;text-align:center;}
.recv-banner{background:linear-gradient(135deg,#059669,#10b981);color:white;
  border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:12px;font-weight:600;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:#1e3a5f;color:white;padding:7px 4px;text-align:center;}
td{border:1px solid #e5e7eb;padding:7px 4px;text-align:center;}
tr:nth-child(even) td{background:#f8fafc;}
.bkb-small{border:none;border-radius:5px;padding:3px 7px;font-size:11px;font-weight:700;cursor:pointer;}
.res-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.b-save{background:#f59e0b;color:white;border:none;border-radius:8px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.b-next{background:#6b7280;color:white;border:none;border-radius:8px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.b-del{background:#ef4444;color:white;border:none;border-radius:8px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.b-excel{width:100%;background:#059669;color:white;border:none;border-radius:8px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.bk-row{display:grid;grid-template-columns:60px 1fr;gap:6px;align-items:center;margin-bottom:8px;}
.bk-section{background:#f8fafc;border:1.5px solid #e5e7eb;border-radius:10px;padding:12px;margin-bottom:10px;}
.gs-inp{width:100%;border:1.5px solid #d1d5db;border-radius:8px;padding:10px;font-size:12px;font-family:inherit;outline:none;}
.g-btn{padding:10px 16px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:white;}
#bkpanel{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:flex-end;justify-content:center;}
#bkpanel.show{display:flex;}
.bkbox{background:white;border-radius:18px 18px 0 0;padding:20px;width:100%;max-width:480px;}
.bk-row2{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px;}
.bkb{border:none;border-radius:10px;padding:14px 8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;color:white;text-align:center;}
#dlg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:600;display:none;align-items:center;justify-content:center;padding:20px;}
#dlg.show{display:flex;}
.dlg-box{background:white;border-radius:16px;padding:20px;width:100%;max-width:360px;}
.dlg-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px;}
.dlg-ok{background:#2563eb;color:white;border:none;border-radius:8px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.dlg-ok.red{background:#ef4444;}
.dlg-cancel{background:#f3f4f6;color:#374151;border:none;border-radius:8px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(30,58,95,.95);color:white;padding:10px 20px;border-radius:30px;font-size:13px;font-weight:600;z-index:700;opacity:0;transition:.3s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;}
#loading{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.8);z-index:800;display:none;align-items:center;justify-content:center;flex-direction:column;gap:10px;}
#loading.show{display:flex;}
.spin{width:40px;height:40px;border:4px solid #e5e7eb;border-top-color:#2563eb;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="hdr" id="main_hdr">
  <div class="hdr-left">
    <span style="font-size:24px;">💧</span>
    <div><div class="hdr-title">수도료 계산기</div><div class="hdr-sub">새말연립 B동</div></div>
  </div>
  <div style="display:flex;gap:6px;">
    <button class="hbtn" onclick="doSync()">☁️ 동기화</button>
    <button class="hbtn" onclick="document.getElementById('bkpanel').classList.add('show')">🗄️ 백업</button>
  </div>
</div>

<div class="pbar" id="main_pbar">
  <select id="sel_year" onchange="loadCurrent()"></select>
  <select id="sel_month" onchange="loadCurrent()"></select>
  <span id="stat_lbl" class="stat st-new">새 데이터</span>
  <button class="nbtn" onclick="confirmNextMonth()">➕ 다음 달</button>
</div>

<div class="tabs" id="main_tabs">
  <div class="tab on" id="tab0" onclick="goTab(0)">① 입력·수정</div>
  <div class="tab" id="tab1" onclick="goTab(1)">② 계산 결과</div>
  <div class="tab" id="tab2" onclick="goTab(2)">③ 은행설정</div>
  <div class="tab" id="tab3" onclick="goTab(3)">④ 앱설정</div>
</div>

<div class="content on" id="step0">
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <div class="ctitle" style="margin:0;">📋 세대별 입력 현황</div>
      <button onclick="refreshStatus()" style="background:#eff6ff;border:1px solid #93c5fd;color:#2563eb;border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;">🔄 새로고침</button>
    </div>
    <div id="sboard" class="sboard"></div>
    <div id="ssummary" class="ssummary">데이터 없음</div>
  </div>
  <div class="card">
    <div class="ctitle">💰 당월 총 수도료 (원)</div>
    <input type="number" id="inp_total" class="total-inp" placeholder="예: 320610" oninput="onInput()">
  </div>
  <div class="card">
    <div class="ctitle">🏠 세대별 지침 입력 <span style="font-size:10px;font-weight:400;color:#9ca3af;">✅완료=잠금 · 🔓수정가능</span></div>
    <div id="units_wrap"></div>
  </div>
  <button class="calc-btn" onclick="doCalc()">💧 계산 및 저장</button>
  <button class="undo-btn" onclick="doUndo()">↩️ 이 달 데이터 되돌리기</button>
</div>

<div class="content" id="step1">
  <div id="recv_banner" class="recv-banner" style="display:none;"></div>
  <div class="res-head">
    <div style="font-size:12px;opacity:.8;" id="r_period"></div>
    <div style="font-size:26px;font-weight:900;margin:4px 0;" id="r_total"></div>
    <div class="res-stats">
      <div class="res-stat"><div style="font-size:9px;opacity:.75;">총 사용량</div><div style="font-size:13px;font-weight:700;margin-top:2px;" id="r_use"></div></div>
      <div class="res-stat"><div style="font-size:9px;opacity:.75;">t당 단가</div><div style="font-size:13px;font-weight:700;margin-top:2px;" id="r_price"></div></div>
      <div class="res-stat"><div style="font-size:9px;opacity:.75;">고정 합계</div><div style="font-size:13px;font-weight:700;margin-top:2px;" id="r_fix"></div></div>
    </div>
  </div>
  <div class="card"><div id="r_table"></div></div>
  <div class="res-btns">
    <button class="b-save" onclick="doSave()">💾 저장</button>
    <button class="b-next" onclick="confirmNextMonth()">➕ 다음 달</button>
    <button class="b-del" onclick="doDelete()">🗑️ 삭제</button>
  </div>
  <button class="b-excel" onclick="doExcel()">📊 엑셀 저장</button>
</div>

<div class="content" id="step2"><div id="bank_wrap"></div></div>

<div class="content" id="step3">
  <div class="card">
    <div class="ctitle">☁️ Google Sheets 연동</div>
    <div style="font-size:11px;color:#6b7280;margin-bottom:10px;">연동하면 모든 당번이 같은 데이터를 공유합니다</div>
    <div style="font-size:10px;color:#9ca3af;margin-bottom:4px;">Apps Script 웹앱 URL</div>
    <input type="url" id="gs_url" class="gs-inp" placeholder="https://script.google.com/macros/s/.../exec" oninput="saveGsUrl()">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;">
      <button class="g-btn" style="background:#2563eb;" onclick="testGS()">🔍 연결 테스트</button>
      <button class="g-btn" style="background:#059669;" onclick="syncFromCloud()">⬇️ 클라우드 불러오기</button>
    </div>
    <button class="g-btn" style="background:#f59e0b;width:100%;margin-top:8px;" onclick="syncToCloud()">⬆️ 전체 데이터 클라우드에 올리기</button>
    <div id="gs_result" style="margin-top:10px;font-size:12px;text-align:center;"></div>
  </div>
  <div class="card">
    <div class="ctitle">📱 세대별 검침 입력 URL</div>
    <div style="font-size:11px;color:#6b7280;margin-bottom:10px;">각 세대에 카카오톡으로 전송하세요</div>
    <div id="ho_urls"></div>
  </div>
</div>

<div id="bkpanel">
  <div class="bkbox">
    <div style="font-size:15px;font-weight:700;color:#1e3a5f;margin-bottom:14px;text-align:center;">🗄️ 백업 · 복원 · 연간엑셀</div>
    <div class="bk-row2">
      <button class="bkb" style="background:#6366f1;" onclick="doBackup()">📤 백업<br><span style="font-weight:400;font-size:10px;">JSON 저장</span></button>
      <button class="bkb" style="background:#0891b2;" onclick="doRestore()">📥 복원<br><span style="font-weight:400;font-size:10px;">파일 불러오기</span></button>
      <button class="bkb" style="background:#059669;" onclick="doYearExcel()">📊 연간엑셀<br><span style="font-weight:400;font-size:10px;">1년치 한번에</span></button>
    </div>
    <button style="width:100%;background:#f3f4f6;color:#374151;border:none;border-radius:10px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;" onclick="document.getElementById('bkpanel').classList.remove('show')">✕ 닫기</button>
  </div>
</div>

<div id="dlg">
  <div class="dlg-box">
    <div style="font-size:15px;font-weight:700;color:#1e3a5f;margin-bottom:10px;" id="dlg_title"></div>
    <div style="font-size:13px;color:#374151;line-height:1.8;white-space:pre-line;" id="dlg_msg"></div>
    <div class="dlg-btns">
      <button class="dlg-cancel" onclick="closeDlg()">취소</button>
      <button class="dlg-ok" id="dlg_ok">확인</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div id="loading"><div class="spin"></div><div style="font-size:13px;">처리 중...</div></div>
<input type="file" id="restore_file" accept=".json" style="display:none" onchange="onRestoreFile(event)">

<script>
const DEFS=[
  {no:1,ho:'101',fix:0,dis:false},{no:2,ho:'102',fix:0,dis:false},
  {no:3,ho:'103',fix:11000,dis:true},{no:4,ho:'104',fix:0,dis:false},
  {no:5,ho:'105',fix:0,dis:false},{no:6,ho:'106',fix:3000,dis:false},
  {no:7,ho:'107',fix:0,dis:false},{no:8,ho:'108',fix:3000,dis:false},
  {no:9,ho:'109',fix:0,dis:false},{no:10,ho:'110',fix:0,dis:false},
  {no:11,ho:'111',fix:0,dis:false},{no:12,ho:'201',fix:0,dis:false},
  {no:13,ho:'202',fix:0,dis:false},{no:14,ho:'203',fix:0,dis:false},
  {no:15,ho:'204',fix:0,dis:false},{no:16,ho:'205',fix:0,dis:false},
  {no:17,ho:'206',fix:0,dis:false}
];
const BANKS=['국민','신한','우리','하나','농협','기업','SC제일','카카오뱅크','토스뱅크','새마을금고','신협','우체국'];
const BANK_URLS={'국민':'https://obank.kbstar.com','신한':'https://www.shinhan.com','우리':'https://www.wooribank.com','하나':'https://www.hanabank.com','농협':'https://www.nonghyup.com','기업':'https://www.ibk.co.kr','SC제일':'https://www.scfirstbank.com','카카오뱅크':'https://www.kakaobank.com','토스뱅크':'https://www.tossbank.com','새마을금고':'https://www.kfcc.co.kr','신협':'https://www.cu.co.kr','우체국':'https://www.epostbank.go.kr'};

const cm=n=>n.toLocaleString('ko-KR');
const ck=n=>n<=0?0:Math.ceil(n/1000)*1000;
let autoTmr=null,calcRes=null;

function toast(msg,dur=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}
function showLoad(){document.getElementById('loading').classList.add('show');}
function hideLoad(){document.getElementById('loading').classList.remove('show');}
function showDlg(title,msg,okTxt,isRed,cb){
  document.getElementById('dlg_title').textContent=title;
  document.getElementById('dlg_msg').textContent=msg;
  const ok=document.getElementById('dlg_ok');
  ok.textContent=okTxt;ok.className='dlg-ok'+(isRed?' red':'');ok.onclick=cb;
  document.getElementById('dlg').classList.add('show');
}
function closeDlg(){document.getElementById('dlg').classList.remove('show');}
function setStat(type,txt){const el=document.getElementById('stat_lbl');el.textContent=txt;el.className='stat '+(type==='saved'?'st-ok':type==='auto'?'st-auto':'st-new');}

const DB_KEY='sudo_v4';
function DB(){try{return JSON.parse(localStorage.getItem(DB_KEY)||'{}')}catch(e){return{};}}
function dbGet(k){return DB()[k]||null;}
function dbPut(k,v){const d=DB();d[k]=v;localStorage.setItem(DB_KEY,JSON.stringify(d));}
function dbDel(k){const d=DB();delete d[k];localStorage.setItem(DB_KEY,JSON.stringify(d));}
function curKey(){return document.getElementById('sel_year').value+'-'+document.getElementById('sel_month').value;}

const H_KEY='sudo_hist';
function getHist(k){try{return(JSON.parse(localStorage.getItem(H_KEY)||'{}'))[k]||[];}catch(e){return[];}}
function saveHist(k,rec){
  const all=JSON.parse(localStorage.getItem(H_KEY)||'{}');
  const h=all[k]||[];
  if(h.length>0&&JSON.stringify(h[h.length-1].input)===JSON.stringify(rec.input))return;
  h.push({input:rec.input,result:rec.result||null,savedAt:rec.savedAt});
  if(h.length>5)h.shift();all[k]=h;localStorage.setItem(H_KEY,JSON.stringify(all));
}
function doUndo(){
  const k=curKey(),h=getHist(k);
  const y=document.getElementById('sel_year').value,m=document.getElementById('sel_month').value;
  if(h.length<=1){toast('↩️ 되돌릴 이전 데이터가 없습니다');return;}
  const items=h.slice(0,-1).reverse();
  showDlg('↩️ '+y+'년 '+m+'월 되돌리기','가장 최근 이전 상태로 되돌립니다.\n\n'+items.map((x,i)=>(i+1)+'. '+x.savedAt).join('\n')+'\n\n되돌리시겠습니까?','되돌리기',true,()=>{
    closeDlg();

function loadBanks(){try{return JSON.parse(localStorage.getItem('sudo_banks')||'{}')}catch(e){return{};}}

function getGsUrl(){return localStorage.getItem('sudo_gs')||'';}
function saveGsUrl(){localStorage.setItem('sudo_gs',document.getElementById('gs_url').value.trim());}

async function gsCall(params){
  const url=getGsUrl();if(!url)return null;
  const u=new URL(url);
  Object.keys(params).forEach(k=>u.searchParams.set(k,typeof params[k]==='object'?JSON.stringify(params[k]):params[k]));
  const r=await fetch(u.toString());return await r.json();
}
async function cloudPut(key,data){if(!getGsUrl())return;try{await gsCall({action:'put',key,data});}catch(e){}}

async function doSync(){
  if(!getGsUrl()){toast('⚠️ 앱설정에서 URL을 먼저 입력하세요');return;}
  showLoad();

    const r=await gsCall({action:'getAll'});const rb=await gsCall({action:'getBanks'});
    hideLoad();if(!r||!r.ok){toast('❌ 동기화 실패');return;}
    const local=DB();Object.assign(local,r.data||{});localStorage.setItem(DB_KEY,JSON.stringify(local));
    if(rb&&rb.ok&&rb.data)saveBanks(rb.data);
    buildSelects();loadCurrent();toast('☁️ 동기화 완료 ('+Object.keys(r.data||{}).length+'개월)');
  }catch(e){hideLoad();toast('❌ 오류: '+e.message);}
}
async function syncFromCloud(){

  showLoad();

    const r=await gsCall({action:'getAll'});hideLoad();if(!r||!r.ok){toast('❌ 실패');return;}

}
async function syncToCloud(){
  if(!getGsUrl()){toast('⚠️ URL을 먼저 입력하세요');return;}

  const d=rec.input||{};

function toggleDis(ho){

    toast('⚠️ 장애인 설정 변경! 포 계산 버튼을 다시 눌러주세요!',4000);

    if(el&&!el.textContent.includes('재계산')){
      el.style.color='#fca5a5';
      el.textContent+=' ⚠️ 재계산 필요';
    }

function applyDis(ho,isDis){const chk=document.getElementById('chk_'+ho);if(chk)chk.checked=isDis;}
function applyFixed(ho,val){
  const v=parseFloat(val)||0;
  const pEl=document.getElementById('prev_'+ho),cEl=document.getElementById('curr_'+ho);
  if(v>0){if(pEl){pEl.disabled=true;pEl.classList.add('dis');}if(cEl){cEl.disabled=true;cEl.classList.add('dis');}}
  else{if(pEl){pEl.disabled=false;pEl.classList.remove('dis');}if(cEl){cEl.disabled=false;cEl.classList.remove('dis');}}
}
function refreshBar(ho){
  const bar=document.getElementById('ubar_'+ho),val=document.getElementById('uval_'+ho);
  if(!bar||!val)return;
  const fv=parseFloat(document.getElementById('fix_'+ho)?.value)||0;
  const p=document.getElementById('prev_'+ho)?.value||'',c=document.getElementById('curr_'+ho)?.value||'';
  const isDis=document.getElementById('chk_'+ho)?.checked||false;
  if(fv>0){bar.className='ubar fix';val.textContent=cm(fv)+'원 고정';return;}
  if(p===''&&c===''){bar.className='ubar';val.textContent='- t';return;}
  const raw=parseFloat(c)-parseFloat(p);
  if(isNaN(raw)){bar.className='ubar';val.textContent='- t';return;}
  if(raw<0){bar.className='ubar err';val.textContent=raw+'t ⚠️';return;}
  bar.className='ubar ok';
  val.textContent=isDis?(raw-10<=0?0:raw-10)+'t (장애인-10t)':raw+'t';
}

function buildStatus(){
  const wrap=document.getElementById('sboard'),summary=document.getElementById('ssummary');
  if(!wrap)return;
  const k=curKey(),rec=dbGet(k);
  const units=(rec&&rec.input&&rec.input.units)?rec.input.units:[];
  let html='',done=0,wait=0,fix=0;
  DEFS.forEach(d=>{
    const u=units.find(x=>x.ho===d.ho)||{};
    const curFix=parseFloat(document.getElementById('fix_'+d.ho)?.value||d.fix||0);
    const curVal=document.getElementById('curr_'+d.ho)?.value||'';
    let cls,icon,lbl;
    if(curFix>0){cls='si-fix';icon='🔒';lbl=d.ho+'호 고정';fix++;}
    else if(u.hoInput&&(u.curr||curVal)){cls='si-done';icon='✅';lbl=d.ho+'호 ('+( u.curr||curVal)+')';done++;}
    else if(curVal){cls='si-note';icon='📝';lbl=d.ho+'호 입력중';done++;}
    else{cls='si-wait';icon='⏳';lbl=d.ho+'호 미입력';wait++;}
    html+=`<div class="si ${cls}">${icon} ${lbl}</div>`;
  });
  wrap.innerHTML=html;
  const total=DEFS.length,inputDone=done+fix,pct=Math.round(inputDone/total*100);
  if(wait===0){summary.className='ssummary done';summary.innerHTML='🎉 전체 '+total+'세대 입력 완료! 💧 계산 가능!';}
  else{summary.className='ssummary';summary.innerHTML='완료 '+inputDone+'/'+total+'세대 ('+pct+'%) · ⏳ 미입력 '+wait+'세대';}
}

function lockUnit(ho,curr){
  const card=document.getElementById('card_'+ho);
  if(!card||document.getElementById('lockbar_'+ho))return;
  card.classList.add('locked');
  ['prev_'+ho,'curr_'+ho].forEach(id=>{const el=document.getElementById(id);if(el){el.disabled=true;el.classList.add('dis');}});

  const bar=document.createElement('div');bar.id='lockbar_'+ho;bar.className='lockbar';
  bar.innerHTML=`<span>✅ 세대 직접입력 완료 (${curr})</span><button class="unlkbtn" onclick="unlockUnit('${ho}')">🔓 수정</button>`;
  card.appendChild(bar);
}
function unlockUnit(ho){
  const card=document.getElementById('card_'+ho);if(!card)return;
  card.classList.remove('locked');
  ['prev_'+ho,'curr_'+ho].forEach(id=>{const el=document.getElementById(id);if(el){el.disabled=false;el.classList.remove('dis');}});
  const nEl=document.getElementById('note_'+ho);if(nEl)nEl.disabled=false;
  const bar=document.getElementById('lockbar_'+ho);if(bar)bar.remove();
  const k=curKey(),rec=dbGet(k);
  if(rec&&rec.input&&rec.input.units){const idx=rec.input.units.findIndex(u=>u.ho===ho);if(idx>=0){rec.input.units[idx].hoInput=false;dbPut(k,rec);}}
  buildStatus();toast('🔓 '+ho+'호 수정 가능');
}

async function doCalc(){
  const total=parseFloat(document.getElementById('inp_total').value)||0;
  if(!total){toast('⚠️ 총 수도료를 입력하세요');return;}
  const units=DEFS.map(u=>({no:u.no,ho:u.ho,
    prev:parseFloat(document.getElementById('prev_'+u.ho)?.value)||0,
    curr:parseFloat(document.getElementById('curr_'+u.ho)?.value)||0,
    fix:parseFloat(document.getElementById('fix_'+u.ho)?.value)||u.fix||0,
    note:document.getElementById('note_'+u.ho)?.value||'',
    dis:document.getElementById('chk_'+u.ho)?.checked||false}));
  const fixSum=units.reduce((s,u)=>s+(u.fix||0),0);
  const totUse=units.reduce((s,u)=>{if(u.fix>0)return s;const r=Math.max(0,u.curr-u.prev),b=r-10;return s+(u.dis?(b<=0?0:b):r);},0);
  const uPrice=totUse>0?(total-fixSum)/totUse:0;
  const rows=units.map(u=>{
    const raw=Math.max(0,u.curr-u.prev);let billed=raw,amount=0,rmk=u.note;
    if(u.fix>0){billed=0;amount=u.fix;rmk=(rmk?rmk+' ':'')+'고정금액';}
    else if(u.dis){const b=raw-10;billed=b<=0?0:b;if(raw>0){amount=ck(billed*uPrice);rmk=(rmk?rmk+' ':'')+(billed===0?'장애인(감산→0원)':'장애인('+raw+'-10='+billed+'t)');}}
    else if(raw>0){amount=ck(raw*uPrice);}
    return{...u,raw,billed,amount,rmk};
  });
  const sumAmt=rows.reduce((s,r)=>s+r.amount,0);
  calcRes={rows,uPrice,fixSum,totUse,sumAmt,total};
  clearTimeout(autoTmr);
  const ts=new Date().toLocaleString('ko-KR');
  const rec={input:getSnap(),result:calcRes,savedAt:ts,auto:false};
  saveHist(curKey(),rec);dbPut(curKey(),rec);
  setStat('saved','계산저장 · '+ts);
  if(getGsUrl())cloudPut(curKey(),rec);
  renderResult();goTab(1);toast('✅ 계산 완료!');
}

  const wb=XLSX.utils.book_new();
  const data=[['호수','전월지침','금월지침','사용량(t)','금액(원)','비고']];
  r.rows.forEach(row=>data.push([row.ho+'호',row.fix>0?'-':row.prev,row.fix>0?'-':row.curr,row.fix>0?'고정':row.raw,row.amount,row.rmk||'']));
  data.push(['합계','','','',r.sumAmt,'']);
  const ws=XLSX.utils.aoa_to_sheet(data);XLSX.utils.book_append_sheet(wb,ws,m+'월');

function doYearExcel(){

  for(let m=1;m<=12;m++){
    const mk=y+'-'+String(m).padStart(2,'0'),rec=dbGet(mk);if(!rec||!rec.result)continue;
    const r=rec.result,data=[['호수','전월','금월','사용량','금액','비고']];
    r.rows.forEach(row=>data.push([row.ho+'호',row.fix>0?'-':row.prev,row.fix>0?'-':row.curr,row.fix>0?'고정':row.raw,row.amount,row.rmk||'']));
    data.push(['합계','','','',r.sumAmt,'']);
    const ws=XLSX.utils.aoa_to_sheet(data);XLSX.utils.book_append_sheet(wb,ws,m+'월');cnt++;
  }
  if(!cnt){toast('저장된 계산 데이터가 없습니다');return;}
  XLSX.writeFile(wb,'새말연립_수도료_'+y+'년_연간.xlsx');
  document.getElementById('bkpanel').classList.remove('show');
}

// AI 계량기 사진 인식
async function hoReadMeter(event){
  const file=event.target.files[0];if(!file)return;
  const preview=document.getElementById('ho_photo_preview');
  const imgEl=document.getElementById('ho_img_preview');
  const aiStatus=document.getElementById('ho_ai_status');
  const inpWrap=document.getElementById('ho_inp_wrap');
  const inp=document.getElementById('ho_curr_inp');
  // 미리보기
  const reader=new FileReader();
  reader.onload=async function(e){
    imgEl.src=e.target.result;preview.style.display='block';
    aiStatus.textContent='🤖 계량기 숫자 인식 중...';aiStatus.style.color='#6b7280';
    // base64 추출
    const base64=e.target.result.split(',')[1];
    try{
      const resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:200,
          messages:[{role:'user',content:[
            {type:'image',source:{type:'base64',media_type:file.type,data:base64}},
            {type:'text',text:'이 사진은 수도 계량기입니다. 계량기에 표시된 숫자(검침량)만 읽어서 숫자만 답하세요. 소수점이나 단위 없이 정수만. 예: 1275'}
          ]}]
        })
      });
      const data=await resp.json();
      const txt=(data.content&&data.content[0]&&data.content[0].text)||'';
      const num=txt.replace(/[^0-9]/g,'');
      if(num){
        inpWrap.style.display='block';
        inp.value=num;
        hoOnInput();
        aiStatus.textContent='✅ 인식: '+num+' · 틀리면 수정 후 저장하세요';
        aiStatus.style.color='#15803d';
      } else {
        aiStatus.textContent='❌ 인식 실패 · 직접 입력해주세요';
        aiStatus.style.color='#dc2626';
        inpWrap.style.display='block';inp.focus();
      }
    }catch(err){
      aiStatus.textContent='❌ 오류 발생 · 직접 입력해주세요';
      aiStatus.style.color='#dc2626';
      inpWrap.style.display='block';inp.focus();
    }
  };
  reader.readAsDataURL(file);
}


async function hoLoadData(ho,y,m){
  const stat=document.getElementById('ho_stat');
  let py=parseInt(y),pm=parseInt(m)-1;if(pm===0){pm=12;py--;}
  const prevKey=String(py)+'-'+String(pm).padStart(2,'0'),curKey2=y+'-'+m;
  let prevVal=null,currVal=null;
  if(getGsUrl()){
    try{
      const rP=await gsCall({action:'get',key:prevKey}),rC=await gsCall({action:'get',key:curKey2});
      if(rP&&rP.ok&&rP.data){const u=(rP.data.input&&rP.data.input.units||[]).find(x=>x.ho===ho);if(u)prevVal=u.curr||null;}
      if(rC&&rC.ok&&rC.data){const u=(rC.data.input&&rC.data.input.units||[]).find(x=>x.ho===ho);if(u&&u.curr)currVal=u.curr;}
    }catch(e){}
  } else {
    const rP=dbGet(prevKey);if(rP){const u=(rP.input&&rP.input.units||[]).find(x=>x.ho===ho);if(u)prevVal=u.curr||null;}
    const rC=dbGet(curKey2);if(rC){const u=(rC.input&&rC.input.units||[]).find(x=>x.ho===ho);if(u&&u.curr)currVal=u.curr;}
  }
  window._hoPrev=prevVal?parseFloat(prevVal):0;
  const pd=document.getElementById('ho_prev_disp');if(pd)pd.textContent=prevVal||'-';
  if(currVal){const inp=document.getElementById('ho_curr_inp');if(inp){inp.value=currVal;hoOnInput();}if(stat){stat.textContent='입력완료';stat.style.background='#dcfce7';stat.style.color='#15803d';}}
  else{if(stat){stat.textContent='미입력';stat.style.background='#fef3c7';stat.style.color='#92400e';}}
}

function hoOnInput(){
  const inp=document.getElementById('ho_curr_inp'),bar=document.getElementById('ho_bar'),ud=document.getElementById('ho_use_disp');
  if(!inp||!bar)return;
  if(!inp.value){bar.style.cssText='margin-top:10px;padding:10px;border-radius:8px;background:#f9fafb;border:1px solid #e5e7eb;text-align:center;font-size:13px;color:#6b7280;';bar.textContent='검침량을 입력하면 사용량이 표시됩니다';if(ud)ud.textContent='-';return;}
  const curr=parseFloat(inp.value),prev=window._hoPrev||0,usage=curr-prev;
  if(usage<0){bar.style.cssText='margin-top:10px;padding:10px;border-radius:8px;background:#fef2f2;border:1px solid #fca5a5;text-align:center;font-size:13px;color:#dc2626;font-weight:700;';bar.textContent='⚠️ 전월지침('+prev+')보다 작습니다!';if(ud){ud.textContent='오류';ud.style.color='#dc2626';}}
  else{bar.style.cssText='margin-top:10px;padding:10px;border-radius:8px;background:#f0fdf4;border:1px solid #86efac;text-align:center;font-size:13px;color:#15803d;font-weight:700;';bar.textContent='✅ 이번 달 사용량: '+usage+' t';if(ud){ud.textContent=usage+'t';ud.style.color='#2563eb';}}
}

async function hoSave(){
  const inp=document.getElementById('ho_curr_inp'),noteInp=document.getElementById('ho_note_inp'),stat=document.getElementById('ho_stat');
  if(!inp||!inp.value){alert('검침량을 입력해주세요');return;}
  const curr=parseFloat(inp.value),prev=window._hoPrev||0;
  if(curr<prev&&!confirm('전월지침('+prev+')보다 작습니다. 그래도 저장하시겠습니까?'))return;
  const ho=window._hoHo,y=window._hoY,m=window._hoM,key=y+'-'+m,ts=new Date().toLocaleString('ko-KR');
  let rec=dbGet(key)||{input:{total:'',units:DEFS.map(d=>({ho:d.ho,prev:'',curr:'',fix:d.fix,note:'',dis:d.dis,hoInput:false}))},result:null,savedAt:ts,auto:true};
  if(!rec.input||!rec.input.units)rec.input={total:'',units:DEFS.map(d=>({ho:d.ho,prev:'',curr:'',fix:d.fix,note:'',dis:d.dis,hoInput:false}))};
  const idx=rec.input.units.findIndex(u=>u.ho===ho);
  if(idx>=0){rec.input.units[idx].prev=String(prev);rec.input.units[idx].curr=String(curr);rec.input.units[idx].note=noteInp?noteInp.value:'';rec.input.units[idx].hoInput=true;}
  rec.savedAt=ts;dbPut(key,rec);
  if(getGsUrl())try{await cloudPut(key,rec);}catch(e){}
  if(stat){stat.textContent='저장완료';stat.style.background='#dcfce7';stat.style.color='#15803d';}
  const done=document.getElementById('ho_done'),doneMsg=document.getElementById('ho_done_msg');
  if(done)done.style.display='block';
  if(doneMsg)doneMsg.innerHTML=y+'년 '+m+'월 <b>'+ho+'호</b> 검침량 <b>'+curr+'</b> 저장완료!<br>사용량: <b>'+(curr-prev)+'t</b>';
  inp.disabled=true;if(noteInp)noteInp.disabled=true;
}

// 초기 실행
(function(){
  const params=new URLSearchParams(location.search),ho=params.get('ho');
  if(ho){showHoScreen(ho);}
  else{buildSelects();loadCurrent();}
})();
</script>
